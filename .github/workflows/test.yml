name: Test & Benchmark

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Homebrew (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Homebrew already installed on macos-latest"
          brew --version

      - name: Install bats (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core coreutils

      - name: Install bats (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install ShellCheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Install ShellCheck (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/workflows/requirements-quality.txt

      - name: ShellCheck (lint + forbid blanket disables)
        run: |
          # Lint every TRACKED shell script, detected by first-line shebang so extensionless
          # scripts (git hooks, bin/ tools) are covered too — not just *.sh. Scanning git-tracked
          # files matches what CI checks out and auto-skips gitignored/vendored content. Exclude
          # the vendored completions dir, bats tests (bats syntax shellcheck can't parse), and md.
          # (uses [[ ]] not case: bash 3.2 — the macOS runner shell — misparses case-pattern
          # ")" as the closing paren of $(...), so case here is a syntax error there.)
          scripts=$(git ls-files -z | while IFS= read -r -d '' f; do
            if [[ "$f" == autocomplete/* || "$f" == *.bats || "$f" == *.md ]]; then continue; fi
            [ -f "$f" ] || continue
            if head -n1 "$f" | grep -qE '^#!.*(bash|/sh|env sh)'; then printf '%s\n' "$f"; fi
          done | sort -u)
          if [ -z "$scripts" ]; then echo "No shell scripts found"; exit 0; fi
          echo "Shell scripts under shellcheck:"; echo "$scripts" | sed 's/^/  /'

          # Policy: no blanket (file-level) disables. A `# shellcheck disable=` must annotate
          # the next line of code; one followed by a blank line or another comment is a global
          # suppression and is forbidden — use a targeted per-line disable instead.
          policy_fail=0
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            awk -v file="$f" '
              prev==1 { if ($0 ~ /^[[:space:]]*$/ || $0 ~ /^[[:space:]]*#/) {
                          printf "::error file=%s,line=%d::blanket \"# shellcheck disable\" is forbidden — put a per-line disable directly above the offending line\n", file, NR-1; bad=1 }
                        prev=0 }
              /^[[:space:]]*#[[:space:]]*shellcheck[[:space:]]+disable=/ { prev=1 }
              END { exit bad }
            ' "$f" || policy_fail=1
          done <<< "$scripts"

          # Lint every detected script (null-delimited to be filename-safe).
          echo "$scripts" | tr '\n' '\0' | xargs -0 shellcheck

          [ "$policy_fail" -eq 0 ]

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with ruff
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy . --ignore-missing-imports

      - name: Run Python tests
        id: pytest
        run: |
          # pipefail: without it, tee masks the test exit code and failures
          # cannot fail the build
          set -o pipefail
          echo "## Python Tests (dot.py)" >> $GITHUB_STEP_SUMMARY
          pytest tests/ -v --tb=short | tee pytest-output.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat pytest-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run validation tests
        id: validate
        run: |
          set -o pipefail
          echo "## Validation Tests" >> $GITHUB_STEP_SUMMARY
          bats tests/test-validate.bats | tee validation-output.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat validation-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run benchmark
        id: benchmark
        run: |
          set -o pipefail
          echo "## Performance Benchmark" >> $GITHUB_STEP_SUMMARY
          bats tests/test-benchmark.bats | tee benchmark-output.txt

          # Extract benchmark results
          if [ -f "${HOME}/.cache/dotfiles/benchmark-results.txt" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat "${HOME}/.cache/dotfiles/benchmark-results.txt" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY

            # Save for PR comment
            cat "${HOME}/.cache/dotfiles/benchmark-results.txt" > benchmark-results.txt
          fi

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read benchmark results
            let benchmarkResults = 'Benchmark results not available';
            try {
              benchmarkResults = fs.readFileSync('benchmark-results.txt', 'utf8');
            } catch (e) {
              console.log('Could not read benchmark results');
            }

            // Read validation output
            let validationOutput = 'Validation results not available';
            try {
              validationOutput = fs.readFileSync('validation-output.txt', 'utf8');
            } catch (e) {
              console.log('Could not read validation output');
            }

            // Read pytest output
            let pytestOutput = 'Python test results not available';
            try {
              pytestOutput = fs.readFileSync('pytest-output.txt', 'utf8');
            } catch (e) {
              console.log('Could not read pytest output');
            }

            const os = '${{ matrix.os }}';
            const osEmoji = os.includes('macos') ? '🍎' : '🐧';
            const osName = os.includes('macos') ? 'macOS' : 'Linux';

            const body = `## ${osEmoji} Test Results (${osName})

            ### 🐍 Python Tests (dot.py)
            \`\`\`
            ${pytestOutput}
            \`\`\`

            ### ✅ Validation Tests
            \`\`\`
            ${validationOutput}
            \`\`\`

            ### ⚡ Performance Benchmark
            \`\`\`
            ${benchmarkResults}
            \`\`\`

            ---
            *Platform: \`${os}\`*`;

            // Find existing comment for this OS
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes(`Test Results (${osName})`)
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            pytest-output.txt
            validation-output.txt
            benchmark-output.txt
            benchmark-results.txt
